name: popping

# Production / default: pulls prebuilt images from GHCR.
# Tag is controlled by POPPING_IMAGE_TAG (default: latest).
# Registry owner is controlled by POPPING_IMAGE_OWNER (default: compactly8274).
#
# Port surface:
#   - frontend:   the only published port. LAN-reachable by default on
#                 0.0.0.0:14789 (set POPPING_FRONTEND_PORT to override;
#                 container port stays at 5173 — Vite default).
#                 Front this with a reverse proxy for TLS.
#   - backend:    not published. Reachable only via the frontend's
#                 internal /api proxy (Vite dev server) on the docker
#                 network.
#   - postgres:   not published. Internal-only.
#   - redis:      not published. Internal-only.
#
# To expose on the LAN, override POPPING_FRONTEND_HOST (0.0.0.0 is the
# default) and put a reverse proxy in front for TLS + auth.
#
# For local dev with hot-reload, drop a docker-compose.override.yml next
# to this file. The override is auto-loaded by `docker compose up` and
# switches both services to `build: ./...` with bind mounts. See
# docker-compose.override.yml.example for the contents.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-popping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-popping}
      POSTGRES_DB: ${POSTGRES_DB:-popping}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-popping} -d ${POSTGRES_DB:-popping}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${POPPING_IMAGE_OWNER:-compactly8274}/popping-backend:${POPPING_IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: ${POPPING_PULL_POLICY:-always}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Cached favicons + thumbnails written by ingest and served at /assets.
      - assets:/app/assets
    # Map host.docker.internal to the docker host's gateway IP. The
    # default OLLAMA_BASE_URL points at host.docker.internal:11434 so
    # the backend can reach an Ollama instance running on the host
    # (typical Linux setup). The gateway IP is the well-known address
    # for this on Linux Docker; on Docker Desktop / macOS the hostname
    # is already resolvable natively. Override OLLAMA_BASE_URL in .env
    # if your Ollama runs somewhere else (a separate container, a
    # different host, etc.).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No published port — backend is only reachable from the frontend
    # via the docker network.

  frontend:
    image: ghcr.io/${POPPING_IMAGE_OWNER:-compactly8274}/popping-frontend:${POPPING_IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: ${POPPING_PULL_POLICY:-always}
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://backend:8000
    ports:
      # Container port is fixed at 5173 (Vite default baked into the image);
      # only the host-side port is configurable via POPPING_FRONTEND_PORT.
      - "${POPPING_FRONTEND_HOST:-0.0.0.0}:${POPPING_FRONTEND_PORT:-14789}:5173"

volumes:
  pgdata:
  assets: