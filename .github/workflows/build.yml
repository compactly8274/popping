name: build

# Build both container images on every push to main and on every PR that
# targets main. Push to GHCR only on push-to-main (PR builds are
# validation-only — they confirm "the merge would still build").
#
# Tags produced:
#   ghcr.io/<owner>/popping-backend:main        <- every push to main
#   ghcr.io/<owner>/popping-backend:sha-<sha>   <- every push (any branch)
#   ghcr.io/<owner>/popping-frontend:main
#   ghcr.io/<owner>/popping-frontend:sha-<sha>
#   ghcr.io/<owner>/popping-{backend,frontend}:<pr>-<num>  <- PR builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # only needed on push-to-main; safe to declare unconditionally

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/popping-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Single platform only — keeps the published manifest a plain
          # Docker v2 manifest, not an OCI image index. GHCR returns 404
          # on OCI image indexes to clients that don't include the OCI
          # index accept header (which plain `docker pull` does not),
          # and that breaks anonymous `docker compose pull`.
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=popping-backend
          cache-to: type=gha,mode=max,scope=popping-backend

  build-frontend:
    name: frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/popping-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # See backend job: single-platform + no provenance keeps the
          # published manifest a plain Docker v2 manifest that anonymous
          # `docker pull` can read.
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha,scope=popping-frontend
          cache-to: type=gha,mode=max,scope=popping-frontend